name: 현재가 자동 갱신

on:
  schedule:
    - cron: '05 7 * * 1-5'  # 평일 16:05 KST (07:05 UTC) — 장 마감 35분 후
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pykrx
        run: pip install pykrx

      - name: 현재가 갱신
        run: python scripts/update_prices.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html portfolio.html data/history.json
          git diff --staged --quiet && echo "변경 없음" || (
            git commit -m "Auto: 현재가 갱신 $(TZ=Asia/Seoul date +'%Y.%m.%d')"
            git push
          )
